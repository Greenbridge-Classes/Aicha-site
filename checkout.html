<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Ai-Cha</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<nav class="navbar navbar-light bg-light shadow-sm">
  <div class="container">
    <a href="index.html" class="navbar-brand fw-bold">Ai-Cha 🍦</a>
  </div>
</nav>

<div class="container py-5">
    <div class="col-md-6 mx-auto">

        <h2 class="text-center mb-4">Checkout</h2>

        <!-- customer form -->
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <form id="checkout-form" class="p-4 shadow-lg bg-white rounded">

                       <h4 class="mb-4 text-center">Customer Details</h4>

                       <!-- name -->
                         <div class="mb-3">
                              <label for="name" class="form-label">Full Name</label>
                              <input type="text" id="name" class="form-control" placeholder="Enter your name" required>
                         </div>

                      <!-- phone -->
                       <div class="mb-3">
                           <label for="phone" class="form-label">Phone Number</label>
                           <input type="tel" id="phone" class="form-control" placeholder="e.g. 07XXXXXXXX" required>
                      </div>

                      <!-- location -->
                      <div class="mb-4">
                         <label for="location" class="form-label">Delivery Location</label>
                         <input type="text" id="location" class="form-control" placeholder="e.g. Makerere, Wandegeya" required>
                     </div>

                     <!-- button -->
                      <button type="button" class="btn btn-success w-100 py-2" onclick="placeOrder()">
                         🧾 Place Order via WhatsApp
                      </button>

                   </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/script.js"></script>

</body>
</html>
