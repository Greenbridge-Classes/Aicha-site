<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Ai-Cha</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- navbar -->
<nav class="navbar navbar-light bg-light shadow-sm">
  <div class="container">
    <a href="index.html" class="navbar-brand fw-bold">Ai-Cha 🍦</a>
    <button class="btn btn-success" onclick="viewCart()">Cart 🛒 (<span id="cart-count">0</span>)</button>
  </div>
</nav>

<!-- menu section -->
<div class="container py-5">
    <h2 class="text-center mb-4">Our Menu</h2>
      <div class="container py-3 text-center">
        <button class="btn btn-outline-primary m-2">All</button>
        <button class="btn btn-outline-primary m-2">Milk Tea</button>
        <button class="btn btn-outline-primary m-2">Ice Cream</button>
     </div>

    <div class="row">
       
       <div class="col-md-4 col-sm-6 mb-4">
         <div class="card product-card shadow-sm h-100">

           <img src="images/tea.jpg" class="card-img-top">

           <div class="card-body text-center">
              <h5 class="fw-bold">Milk Tea</h5>
              <p class="text-muted">Delicious creamy tea</p>
              <h6 class="text-success">UGX 10,000</h6>

              <button class="btn btn-success w-100 mt-2"
                onclick="addToCart('Milk Tea', 10000)">
                Add to Cart
              </button>
          </div>

          </div>
     </div>
   </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
