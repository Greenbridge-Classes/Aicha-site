<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - Ai-Cha</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- navbar -->
<nav class="navbar navbar-light bg-light shadow-sm">
  <div class="container">
    <a href="index.html" class="navbar-brand fw-bold">Ai-Cha 🍦</a>
    <button class="btn btn-success" onclick="viewCart()">Cart 🛒 (<span id="cart-count">0</span>)</button>
  </div>
</nav>

<!-- menu section -->
<div class="container py-5">
    <h2 class="text-center mb-4">Our Menu</h2>

    <div class="row">

        <!-- Item 1 -->
        <div class="col-md-4 col-sm-6 mb-4">
            <div class="card shadow-lg">
                <img src="images/tea.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Milk Tea</h5>
                    <p>UGX 10,000</p>
                    <button class="btn btn-success" onclick="addToCart('Milk Tea', 10000)">
                        Add to Cart
                    </button>
                </div>
            </div>
        </div>

        <!-- Item 2 -->
        <div class="col-md-4 col-sm-6 mb-4">
            <div class="card shadow-lg">
                <img src="images/icecream.jpg" class="card-img-top">
                <div class="card-body text-center">
                    <h5>Ice Cream</h5>
                    <p>UGX 8,000</p>
                    <button class="btn btn-success" onclick="addToCart('Ice Cream', 8000)">
                        Add to Cart
                    </button>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
